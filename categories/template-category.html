<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Qwickton reusable category template for SEO-friendly frontend tool pages."
    />
    <title>Qwickton Category Template</title>
    <link rel="stylesheet" href="../css/styles.css" />
  </head>
  <body>
    <header class="site-header">
      <div class="container nav-wrap">
        <div class="nav-left">
          <a class="logo" href="../index.html"
            ><span class="logo-mark">Q</span><span>Qwickton</span></a
          >
        </div>
        <div class="nav-right">
          <button
            class="btn btn-ghost header-menu-btn"
            id="headerMenuBtn"
            data-menu-open="true"
            aria-label="Open site menu"
            aria-expanded="false"
            type="button"
          >
            <span class="menu-icon" aria-hidden="true">☰</span>
            <span>Menu</span>
          </button>
        </div>
      </div>
    </header>

    <main class="page-main container">
      <p class="breadcrumb">
        <a href="../index.html">Home</a> / <span id="catNameBread">Category</span>
      </p>
      <h1 id="catNameTitle">Category Template</h1>
      <p class="hero-copy" id="catDescription">
        Reusable SEO page template for upcoming tools in this category.
      </p>
      <p class="privacy-note">All upcoming tools stay 100% browser-side and private.</p>

      <section class="ad-slot top-banner" aria-label="Advertisement placement">
        <p>Ad Placement: Top Banner</p>
      </section>

      <section class="tool-grid" id="templateToolGrid"></section>

      <section class="ad-slot" style="margin-top: 1rem" aria-label="Advertisement placement">
        <p>Ad Placement: Between Tools</p>
      </section>
    </main>

    <footer class="site-footer">
      <div class="container footer-grid">
        <p>&copy; <span id="year"></span> Qwickton</p>
        <p><a href="../index.html">Back to all categories</a></p>
      </div>
    </footer>
    <script src="../js/app.js"></script>
    <script src="../js/template-category.js"></script>
  </body>
</html>
