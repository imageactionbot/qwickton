<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" role="img" aria-labelledby="logoTitle">
  <title id="logoTitle">Qwickton</title>
  <defs>
    <linearGradient id="qkLogoBg" x1="8%" y1="6%" x2="92%" y2="94%">
      <stop offset="0%" stop-color="#3d5aed"/>
      <stop offset="52%" stop-color="#5b73f5"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>
    <linearGradient id="qkLogoAccent" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#22d3ee"/>
      <stop offset="100%" stop-color="#67e8f9"/>
    </linearGradient>
  </defs>
  <rect width="128" height="128" rx="30" fill="url(#qkLogoBg)"/>
  <!-- Swift accent under the tail -->
  <path
    d="M28 96c18-28 46-52 78-62"
    fill="none"
    stroke="url(#qkLogoAccent)"
    stroke-width="5"
    stroke-linecap="round"
    opacity="0.9"
  />
  <!-- Q ring -->
  <path
    d="M42 44c0-12 10-22 22-22s22 10 22 22-10 22-22 22a21.8 21.8 0 0 1-15.2-6.2"
    fill="none"
    stroke="#ffffff"
    stroke-width="10"
    stroke-linecap="round"
  />
  <!-- Tail -->
  <path d="M71 65 L 92 92" fill="none" stroke="#ffffff" stroke-width="10" stroke-linecap="round"/>
</svg>
