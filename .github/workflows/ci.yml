name: CI

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  checks:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Security audit (production deps)
        run: npm audit --audit-level=high --omit=dev

      - name: Lint
        run: npm run lint

      - name: Format check
        run: npm run format:check

      - name: Smoke tests
        run: npm test
