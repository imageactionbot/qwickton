# Cloudflare Pages — push to `main` par auto deploy
#
# Pehle Cloudflare dashboard mein Pages project banao (Direct Upload / any).
# Phir GitHub repo → Settings → Secrets and variables → Actions:
#   Secrets:
#     CLOUDFLARE_API_TOKEN     → API Token with "Cloudflare Pages — Edit"
#     CLOUDFLARE_ACCOUNT_ID    → Dashboard right sidebar / Overview
#     CLOUDFLARE_PAGES_PROJECT → Project ka naam (jaise qwickton)
#     VITE_SITE_URL            → https://tumhara-domain.com  (sitemap / SEO)
#   Optional secret:
#     VITE_ADSENSE_CLIENT      → ca-pub-...
#
name: Deploy Cloudflare Pages

on:
  push:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: read
  deployments: write

concurrency:
  group: pages-deploy
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Build
        working-directory: frontend
        env:
          VITE_SITE_URL: ${{ secrets.VITE_SITE_URL }}
          VITE_ADSENSE_CLIENT: ${{ secrets.VITE_ADSENSE_CLIENT }}
        run: npm run build

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy frontend/dist --project-name=${{ secrets.CLOUDFLARE_PAGES_PROJECT }}
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}
