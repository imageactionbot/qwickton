# Cloudflare Pages — push to `main` par auto deploy
#
# Pehle Cloudflare dashboard mein Pages project banao (Direct Upload / any).
# Phir GitHub repo → Settings → Secrets and variables → Actions:
#   Secrets:
#     CLOUDFLARE_API_TOKEN     → API Token with "Cloudflare Pages — Edit"
#     CLOUDFLARE_ACCOUNT_ID    → Dashboard right sidebar / Overview
#     CLOUDFLARE_PAGES_PROJECT → Project ka naam (jaise qwickton)
#     VITE_SITE_URL            → https://tumhara-domain.com  (sitemap / SEO)
#   Optional secrets:
#     VITE_ADSENSE_CLIENT       → ca-pub-5368355682383000 (same as index.html; ads.txt on build)
#
name: Deploy Cloudflare Pages

on:
  push:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: read
  deployments: write

concurrency:
  group: pages-deploy
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Build
        working-directory: frontend
        env:
          VITE_SITE_URL: ${{ secrets.VITE_SITE_URL }}
          # ads.txt + bundle fallback; override via secret if publisher id ever changes
          VITE_ADSENSE_CLIENT: ${{ secrets.VITE_ADSENSE_CLIENT != '' && secrets.VITE_ADSENSE_CLIENT || 'ca-pub-5368355682383000' }}
        run: npm run build

      - name: Verify AdSense artifacts
        working-directory: frontend
        run: |
          test -f dist/ads.txt || (echo "::error::dist/ads.txt missing — add public/ads.txt or VITE_ADSENSE_CLIENT" && exit 1)
          grep -q "pub-5368355682383000" dist/ads.txt || (echo "::error::dist/ads.txt missing publisher line" && exit 1)
          grep -q "google-adsense-account" dist/index.html || (echo "::error::prerendered index missing AdSense meta" && exit 1)

      - name: Check Cloudflare secrets
        env:
          CF_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CF_ACCOUNT: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CF_PROJECT: ${{ secrets.CLOUDFLARE_PAGES_PROJECT }}
        run: |
          if [ -z "$CF_TOKEN" ] || [ -z "$CF_ACCOUNT" ] || [ -z "$CF_PROJECT" ]; then
            echo "::error::GitHub repo → Settings → Secrets → Actions: add CLOUDFLARE_API_TOKEN, CLOUDFLARE_ACCOUNT_ID, CLOUDFLARE_PAGES_PROJECT (and VITE_SITE_URL for real sitemap)."
            exit 1
          fi

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: frontend
          command: pages deploy dist --project-name=${{ secrets.CLOUDFLARE_PAGES_PROJECT }}
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}
          wranglerVersion: "3.90.0"
